name: 主动查成绩

on:
  workflow_dispatch:          # 仅手动触发（由 Telegram Bot 调用）

jobs:
  query:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p status logs

      - name: 查询成绩并发送邮件
        env:
          GZHU_USERNAME: ${{ secrets.GZHU_USERNAME }}
          GZHU_PASSWORD: ${{ secrets.GZHU_PASSWORD }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
        run: python -m src.main --query

      - name: 保存日志
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: query-logs
          path: logs/
          retention-days: 7
