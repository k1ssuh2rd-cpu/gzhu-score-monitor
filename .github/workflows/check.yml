name: 成绩监测

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时自动运行一次
  workflow_dispatch:          # 支持手动触发

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p status logs

      - name: 恢复上次成绩状态缓存
        id: cache
        uses: actions/cache@v5
        with:
          path: status/scores.json
          key: scores-state-${{ github.run_id }}
          restore-keys: |
            scores-state-

      - name: 检查成绩并通知
        env:
          GZHU_USERNAME: ${{ secrets.GZHU_USERNAME }}
          GZHU_PASSWORD: ${{ secrets.GZHU_PASSWORD }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
        run: python -m src.main --check

      - name: 保存日志
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs
          path: logs/
          retention-days: 7
