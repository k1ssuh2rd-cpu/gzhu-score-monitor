name: 成绩监测

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: pip install .

      - name: 恢复成绩状态
        id: cache-state
        uses: actions/cache@v4
        with:
          path: status/scores.json
          key: scores-state-${{ github.run_id }}
          restore-keys: |
            scores-state-

      - name: 生成 .env 配置
        run: |
          mkdir -p status
          cat > .env << 'EOF'
          GZHU_USERNAME=${{ secrets.GZHU_USERNAME }}
          GZHU_PASSWORD=${{ secrets.GZHU_PASSWORD }}
          QQ_EMAIL=${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE=${{ secrets.QQ_AUTH_CODE }}
          RECEIVER_EMAILS=${{ secrets.RECEIVER_EMAILS }}
          TEST_EMAIL=${{ secrets.TEST_EMAIL }}
          CHECK_INTERVAL=21600
          EMAIL_SUBJECT=新成绩通知
          ENABLE_LOGIN_TEST_EMAIL=false
          HEARTBEAT_ENABLED=false
          EOF

      - name: 检查成绩
        run: python -m src.main --check
