name: Telegram Bot 轮询

on:
  schedule:
    - cron: '*/5 * * * *'        # 每 5 分钟查一次有没有新消息
  workflow_dispatch:               # 也支持手动触发

jobs:
  poll:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p status logs

      - name: 恢复 Telegram 偏移量缓存
        uses: actions/cache@v5
        with:
          path: status/telegram_offset.json
          key: telegram-offset-${{ github.run_id }}
          restore-keys: |
            telegram-offset-

      - name: 轮询 Telegram 消息
        env:
          GZHU_USERNAME: ${{ secrets.GZHU_USERNAME }}
          GZHU_PASSWORD: ${{ secrets.GZHU_PASSWORD }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_AUTH_CODE: ${{ secrets.QQ_AUTH_CODE }}
          RECEIVER_EMAILS: ${{ secrets.RECEIVER_EMAILS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m src.main --poll-telegram
